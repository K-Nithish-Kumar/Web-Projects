<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- FavIcon -->
    <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">
    <!-- RemixIcon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css">
    <!-- Sakura CSS -->
    <link rel="stylesheet" href="css/Sakura.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <title>Responsive temple website - Nithish</title>
</head>

<body>

    <!-- Header -->
    <header class="header" id="header">
        <nav class="nav container">
            <a href="#" class="nav__logo">
                <i class="ri-ancient-gate-line"></i>
                <span>Temple</span>
            </a>

            <div class="nav__menu" id="nav-menu">
                <ul class="nav__list">
                    <li>
                        <a href="#" class="nav__link">Home</a>
                    </li>

                    <li>
                        <a href="#" class="nav__link">Location</a>
                    </li>

                    <li>
                        <a href="#" class="nav__link">About</a>
                    </li>

                    <li>
                        <a href="#" class="nav__link">Explore</a>
                    </li>

                    <li>
                        <a href="#" class="nav__link">Contact</a>
                    </li>
                </ul>

                <!-- close button -->
                <div class="nav__close" id="nav-close">
                    <i class="ri-close-large-line"></i>
                </div>
            </div>

            <!-- Toggle Button -->
            <div class="nav__toggle" id="nav-toggle">
                <i class="ri-apps-2-line"></i>
            </div>
        </nav>
    </header>

    <!-- Main -->
    <main class="main">

        <!-- Home -->
        <section class="home">
            <img src="images/img-bg.svg" alt="image" class="home__bg">
            <div class="home__container container">
                <div class="home__data">
                    <h1 class="home__title">Welcome To <br>Temple</h1>
                    <p class="home__description">
                        The temple is an attractive tourist place
                        where you could visit and connect to the
                        pure land of the environment, you will
                        experience peace and harmony.
                    </p>

                    <a href="#" class="home__button">Explore Place</a>

                    <img src="images/lantern-1.svg" alt="image" class="home__lantern-1">
                    <img src="images/lantern-2.svg" alt="image" class="home__lantern-2">
                </div>

                <div class="home__images">
                    <img src="images/img-1.svg" alt="image" class="home__img-1">
                    <img src="images/img-2.svg" alt="image" class="home__img-2">
                    <img src="images/img-3.svg" alt="image" class="home__img-3">
                    <img src="images/img-4.svg" alt="image" class="home__img-4">
                    <img src="images/img-5.svg" alt="image" class="home__img-5">
                    <img src="images/img-6.svg" alt="image" class="home__img-6">
                </div>
            </div>
        </section>
    </main>

    <!-- Sakura petals -->
     <div class="sakura-petals"></div>

    <!-- GSAP -->
    <script src="JS/gsap.min.js"></script>

    <!-- Sakura JS -->
    <script src="JS/sakura.min.js"></script>

    <!-- Main JS -->
    <script src="JS/main.js"></script>
</body>

</html>
